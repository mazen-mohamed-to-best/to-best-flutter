name: Extract Project

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract archive and flatten root folder
        run: |
          set -e

          mkdir -p extracted
          tar -xzf to-best-flutter.tar.gz -C extracted

          ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)

          if [ -n "$ROOT" ]; then
            shopt -s dotglob nullglob
            mv "$ROOT"/* .
            mv "$ROOT"/.[!.]* . 2>/dev/null || true
            mv "$ROOT"/..?* . 2>/dev/null || true
            rm -rf extracted
          else
            shopt -s dotglob nullglob
            mv extracted/* .
            mv extracted/.[!.]* . 2>/dev/null || true
            mv extracted/..?* . 2>/dev/null || true
            rm -rf extracted
          fi

      - name: Show final structure
        run: |
          ls -la
