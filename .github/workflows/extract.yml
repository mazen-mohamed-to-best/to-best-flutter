name: Extract Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract archive
        run: |
          set -e
          mkdir -p extracted
          tar -xzf to-best-flutter.tar.gz -C extracted

      - name: Flatten into repository root
        run: |
          set -e

          ROOT=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$ROOT" ]; then
            ROOT="extracted"
          fi

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            "$ROOT"/ ./

          rm -rf extracted

      - name: Commit and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Extract project from archive"
          git push
